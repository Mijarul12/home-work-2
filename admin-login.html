<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Homework Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Homework Management Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dos-and-donts.html">Do's or Don't</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="agreement.html">JOIN TODAY</a></li>
                <li><a href="buy-plan.html">Buy Plan</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="how-it-works.html">How to Work</a></li>
                <li><a href="dsa-login.html">DSA Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div id="admin-login" class="tab-content active">
                <h2>Admin Login</h2>
                <form onsubmit="return validateCaptcha(this)">
                    <div class="form-group">
                        <label for="admin-email">Email</label>
                        <input type="email" id="admin-email" name="admin-email" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-password">Password</label>
                        <input type="password" id="admin-password" name="admin-password" required>
                    </div>
                    <div class="form-group captcha-group">
                        <label for="admin-captcha">Captcha</label>
                        <div class="captcha-wrapper">
                            <input type="text" id="admin-captcha" name="captcha" required>
                            <span class="captcha-code"></span>
                            <button type="button" class="refresh-captcha">&#x21bb;</button>
                        </div>
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Homework Management. All Rights Reserved. | <a href="terms.html">Term & Condition</a></p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
